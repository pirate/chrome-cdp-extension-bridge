name: Client Demos

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  client-demo:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: js loopback
            command: node dist/client/js/demo.js --loopback
          - name: js debugger
            command: node dist/client/js/demo.js --debugger
          - name: js direct
            command: node dist/client/js/demo.js --direct
          - name: python loopback
            command: cd client/python && uv run python demo.py --loopback
          - name: python debugger
            command: cd client/python && uv run python demo.py --debugger
          - name: python direct
            command: cd client/python && uv run python demo.py --direct
          - name: go loopback
            command: cd client/go && go run ./demo --loopback
          - name: go debugger
            command: cd client/go && go run ./demo --debugger
          - name: go direct
            command: cd client/go && go run ./demo --direct
          - name: playwright proxy
            command: node dist/client/js/examples/playwright.js
          - name: puppeteer proxy
            command: node dist/client/js/examples/puppeteer.js
    env:
      CHROME_PATH: /usr/bin/chromium
      CI: "true"
      GOFLAGS: -buildvcs=false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: client/go/go.mod
          cache-dependency-path: client/go/go.sum
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: ${{ matrix.command }}
